<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
</head>
<body>

<h1>Todo Application</h1>

{% if user.is_authenticated %}

    <h3>Welcome {{ user.username }}</h3>

    <a href="{% url 'logout' %}">
        Logout
    </a>

{% else %}

    <a href="{% url 'login' %}">
        Login
    </a>

    <br><br>

    <a href="{% url 'register' %}">
        Register
    </a>

{% endif %}

</body>
</html>
