{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-lg border-0 p-4">

                <h2 class="text-center mb-4">
                    Login
                </h2>


                <form method="POST">


                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">
                            Username
                        </label>

                        <input type="text"
                               name="username"
                               class="form-control"
                               placeholder="Enter Username"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Password
                        </label>

                        <input type="password"
                               name="password"
                               class="form-control"
                               placeholder="Enter Password"
                               required>
                    </div>

                    <button type="submit"
                            class="btn btn-primary w-100">
                        Login
                    </button>

                </form>

                <div class="mt-3 text-center">

                    <p>
                        Don't have an account?
                        <a href="{% url 'register' %}"
                           class="fw-bold text-primary text-decoration-none">
                            Register here
                        </a>
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
