<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Tasks</title>
</head>
<body>
    <h2>Your Tasks</h2>

{% for task in tasks %}
    <p>{{ task.title }} - {{ task.completed }}</p>
{% empty %}
    <p>No tasks found</p>
{% endfor %}
</body>
</html>
